apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atauth

resources:
  - ../../base
  - backup-cronjob.yaml

commonLabels:
  environment: production

images:
  - name: atauth-gateway
    newName: gitea.cloudforest-basilisk.ts.net/arcnode.xyz/atauth-gateway
    newTag: latest  # Use specific version tags in production!

# Production-specific patches
patches:
  # Enable pod disruption budget for HA
  - target:
      kind: Deployment
      name: atauth-gateway
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          reloader.stakater.com/auto: "true"
