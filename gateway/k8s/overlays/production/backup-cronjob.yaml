---
# CronJob to backup SQLite database before deployments
apiVersion: batch/v1
kind: CronJob
metadata:
  name: atauth-gateway-backup
  namespace: atauth
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
          containers:
            - name: backup
              image: alpine:3.19
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/backups/gateway-${TIMESTAMP}.db"

                  echo "Starting backup at ${TIMESTAMP}"

                  # Copy database (SQLite safe copy)
                  cp /data/gateway.db "${BACKUP_FILE}"

                  # Verify backup
                  sqlite3 "${BACKUP_FILE}" "PRAGMA integrity_check;"

                  # Keep only last 10 backups
                  ls -t /backups/gateway-*.db | tail -n +11 | xargs -r rm

                  echo "Backup complete: ${BACKUP_FILE}"
                  ls -la /backups/
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "10m"
                limits:
                  memory: "64Mi"
                  cpu: "100m"
          restartPolicy: OnFailure
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: atauth-gateway-data
            - name: backups
              persistentVolumeClaim:
                claimName: atauth-gateway-backups
---
# PVC for backups
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atauth-gateway-backups
  namespace: atauth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# Job to run backup before deployment (triggered manually or by CI)
apiVersion: batch/v1
kind: Job
metadata:
  name: atauth-pre-deploy-backup
  namespace: atauth
  annotations:
    # This job is meant to be created fresh each time
    helm.sh/hook: pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backup
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              BACKUP_FILE="/backups/pre-deploy-${TIMESTAMP}.db"

              echo "Creating pre-deployment backup"
              cp /data/gateway.db "${BACKUP_FILE}"
              sqlite3 "${BACKUP_FILE}" "PRAGMA integrity_check;"

              echo "Pre-deploy backup complete: ${BACKUP_FILE}"
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: backups
              mountPath: /backups
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      restartPolicy: Never
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: atauth-gateway-data
        - name: backups
          persistentVolumeClaim:
            claimName: atauth-gateway-backups
