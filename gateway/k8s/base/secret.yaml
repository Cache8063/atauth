apiVersion: v1
kind: Secret
metadata:
  name: atauth-gateway-secrets
  namespace: atauth
  labels:
    app.kubernetes.io/name: atauth-gateway
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Admin token for API access
  # Generate with: openssl rand -hex 32
  ADMIN_TOKEN: "CHANGE_ME_generate_with_openssl_rand_hex_32"

  # OIDC key encryption secret (32 bytes)
  # Generate with: openssl rand -hex 32
  OIDC_KEY_SECRET: "CHANGE_ME_generate_with_openssl_rand_hex_32"

  # MFA encryption key (32 bytes hex = 64 characters)
  # Generate with: openssl rand -hex 32
  MFA_ENCRYPTION_KEY: "CHANGE_ME_generate_with_openssl_rand_hex_32"

  # SMTP credentials (if EMAIL_ENABLED=true)
  # SMTP_HOST: "smtp.example.com"
  # SMTP_PORT: "587"
  # SMTP_SECURE: "false"
  # SMTP_USER: "noreply@example.com"
  # SMTP_PASS: "your-smtp-password"

  # Or use API-based email provider
  # EMAIL_API_KEY: "your-api-key"
