apiVersion: v1
kind: Service
metadata:
  name: atauth-gateway
  namespace: atauth
  labels:
    app.kubernetes.io/name: atauth-gateway
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: atauth-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
