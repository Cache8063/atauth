---
# Registry credentials for Kaniko to push images
# Create with: kubectl create secret docker-registry registry-credentials \
#   --docker-server=gitea.cloudforest-basilisk.ts.net \
#   --docker-username=<username> \
#   --docker-password=<password> \
#   -n tekton-pipelines
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: tekton-pipelines
  annotations:
    tekton.dev/docker-0: https://gitea.cloudforest-basilisk.ts.net
type: kubernetes.io/dockerconfigjson
stringData:
  # Replace with actual credentials or use kubectl create secret
  .dockerconfigjson: |
    {
      "auths": {
        "gitea.cloudforest-basilisk.ts.net": {
          "username": "REPLACE_WITH_USERNAME",
          "password": "REPLACE_WITH_PASSWORD",
          "auth": "REPLACE_WITH_BASE64_USER_PASS"
        }
      }
    }
---
# Git credentials for private repos (if needed)
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: tekton-pipelines
  annotations:
    tekton.dev/git-0: https://gitea.cloudforest-basilisk.ts.net
type: kubernetes.io/basic-auth
stringData:
  username: REPLACE_WITH_USERNAME
  password: REPLACE_WITH_TOKEN
