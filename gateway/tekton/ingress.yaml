---
# Ingress for Tekton EventListener webhook
# This allows Gitea to trigger builds via webhook
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-atauth-webhook
  namespace: tekton-pipelines
  annotations:
    # Traefik (k3s default)
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: tekton-webhook.cloudforest-basilisk.ts.net
      http:
        paths:
          - path: /atauth
            pathType: Prefix
            backend:
              service:
                name: el-atauth-gateway-listener
                port:
                  number: 8080
  tls:
    - hosts:
        - tekton-webhook.cloudforest-basilisk.ts.net
      secretName: tekton-webhook-tls
