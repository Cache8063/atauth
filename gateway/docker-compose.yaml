version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: atauth-gateway:latest
    container_name: atauth-gateway
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - atauth-data:/app/data
    environment:
      # Server
      - PORT=3100
      - HOST=0.0.0.0
      - NODE_ENV=production

      # OAuth client configuration
      - OAUTH_CLIENT_ID=https://auth.example.com/client-metadata.json
      - OAUTH_REDIRECT_URI=https://auth.example.com/auth/callback

      # CORS
      - CORS_ORIGINS=https://example.com,http://localhost:3000

      # Admin token (REQUIRED - generate with: openssl rand -hex 32)
      - ADMIN_TOKEN=${ADMIN_TOKEN:?Set ADMIN_TOKEN}

      # OIDC configuration
      - OIDC_ENABLED=true
      - OIDC_ISSUER=https://auth.example.com
      # REQUIRED when OIDC_ENABLED=true (generate with: openssl rand -hex 32)
      - OIDC_KEY_SECRET=${OIDC_KEY_SECRET:?Set OIDC_KEY_SECRET}
      - OIDC_KEY_ALGORITHM=ES256

      # Passkey/WebAuthn
      - PASSKEY_ENABLED=true
      - WEBAUTHN_RP_NAME=ATAuth
      - WEBAUTHN_RP_ID=auth.example.com
      - WEBAUTHN_ORIGIN=https://auth.example.com

      # MFA
      - MFA_ENABLED=true
      - MFA_TOTP_ISSUER=ATAuth
      # REQUIRED when MFA is enabled (generate with: openssl rand -hex 64)
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY:?Set MFA_ENCRYPTION_KEY}

      # Email (disabled by default)
      - EMAIL_ENABLED=false
      # - EMAIL_PROVIDER=smtp
      # - EMAIL_FROM=ATAuth <noreply@example.com>
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USER=noreply@example.com
      # - SMTP_PASS=your-password

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  atauth-data:
    driver: local
